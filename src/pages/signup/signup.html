<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Velora</title>
  <script src="https://cdn.tailwindcss.com"></script>
<style>
body.dark { background: #0f172a !important; color: #f1f5f9 !important; }
.dark .bg-teal-800 { background: #0d9488 !important; }
.dark .bg-white { background: #1e293b !important; }
.dark .text-gray-600 { color: #94a3b8 !important; }
.dark .bg-gray-100 { background: #334155 !important; }
.dark input, .dark select { background: #1e293b !important; color: #f1f5f9 !important; }
</style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">
  <!-- NAVBAR -->
<nav class="flex justify-between items-center bg-teal-800 text-white p-4 sticky top-0 z-40">
  <div class="flex items-center space-x-3">
    <div class="text-xl font-bold">Velora</div>
    <button id="themeToggle" class="p-1.5 rounded-full bg-teal-600 hover:bg-teal-700 text-white transition-all">🌙</button>
  </div>
  <div class="space-x-4">
    <a href="../../../index.html" class="hover:underline">Home</a>
    <a href="../about/about.html" class="hover:underline">About</a>
    <a href="../contact/contact.html" class="hover:underline">Contact</a>
    <a href="../signin/signin.html" class="hover:underline">Sign In</a>
    <a href="./signup.html" class="hover:underline font-bold">Sign Up</a>
  </div>
</nav>

  <!-- SIGN UP FORM -->
  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white shadow-md rounded-lg p-8 w-full max-w-md">
      <h1 class="text-2xl font-bold text-teal-800 mb-1">Create Account</h1>
      <p class="text-gray-500 text-sm mb-6">Join us today — it's free!</p>

      <div id="signupMessage" class="hidden bg-teal-50 border border-teal-300 text-teal-800 p-3 rounded mb-4 text-sm"></div>

      <form id="signupForm" class="space-y-4">
        <div>
          <label class="block mb-1 font-medium text-sm">Full Name</label>
          <input type="text" placeholder="Your full name"
            class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400" required>
        </div>
        <div>
          <label class="block mb-1 font-medium text-sm">Email Address</label>
          <input type="email" placeholder="you@example.com"
            class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400" required>
        </div>
        <div>
          <label class="block mb-1 font-medium text-sm">Password</label>
          <input id="signupPass" type="password" placeholder="Min. 8 characters"
            class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400" required>
        </div>
        <div>
          <label class="block mb-1 font-medium text-sm">Confirm Password</label>
          <input id="signupPass2" type="password" placeholder="Repeat your password"
            class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400" required>
        </div>
        <div class="flex items-start gap-2 text-sm">
          <input type="checkbox" class="mt-1 accent-teal-600" required>
          <label>I agree to the <a href="#" class="text-teal-600 hover:underline">Terms & Conditions</a></label>
        </div>
        <input type="submit" value="Create Account"
          class="w-full p-2 bg-teal-600 text-white rounded hover:bg-teal-700 cursor-pointer font-semibold">
      </form>

      <p class="text-sm text-center mt-4 text-gray-600">
        Already have an account?
        <a href="../signin/signin.html" class="text-teal-600 hover:underline font-medium">Sign In</a>
      </p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-teal-900 text-white text-center p-4">
    © 2026 Velora. All rights reserved.
  </footer>
<script>
/* THEME TOGGLE */
(() => {
  const btn = document.getElementById('themeToggle');
  if (!btn) return;
  
  const applyTheme = (dark) => {
    document.body.classList.toggle('dark', dark);
    btn.textContent = dark ? '☀️' : '🌙';
  };
  
  const saved = localStorage.theme === 'dark';
  applyTheme(saved);
  
  btn.onclick = () => {
    const dark = !document.body.classList.contains('dark');
    localStorage.theme = dark ? 'dark' : 'light';
    applyTheme(dark);
  };
})();
</script>
<script type="module" src="script.js"></script>
</body>
</html>
