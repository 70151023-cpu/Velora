<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Velora</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

  <!-- NAVBAR -->
  <nav class="flex justify-between items-center bg-teal-800 text-white p-4">
    <div class="text-xl font-bold">Velora</div>
    <div class="space-x-4">
      <a href="../../../index.html">Home</a>
      <a href="../about/about.html" class="hover:underline">About</a>
      <a href="../contact/contact.html" class="hover:underline">Contact</a>
      <a href="../signin/signin.html" class="hover:underline font-bold underline">Sign In</a>
      <a href="../signup/signup.html" class="hover:underline">Sign Up</a>
    </div>
  </nav>

  <!-- CARD -->
  <div class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white shadow-md rounded-lg p-8 w-full max-w-md">

      <!-- FORM SECTION -->
      <div id="formSection">
        <h1 class="text-2xl font-bold text-teal-800 mb-1">Sign In</h1>
        <p class="text-gray-500 text-sm mb-6">Welcome back! Please enter your credentials.</p>

        <div id="signinMessage" class="hidden bg-red-50 border border-red-300 text-red-700 p-3 rounded mb-4 text-sm font-medium"></div>

        <form id="signinForm" class="space-y-4">
          <div>
            <label class="block mb-1 font-medium text-sm">Email Address</label>
            <input id="signinEmail" type="email" placeholder="you@example.com"
              class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400">
          </div>
          <div>
            <label class="block mb-1 font-medium text-sm">Password</label>
            <input id="signinPass" type="password" placeholder="••••••••"
              class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-teal-400">
          </div>
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-1">
              <input type="checkbox" class="accent-teal-600"> Remember me
            </label>
            <a href="#" class="text-teal-600 hover:underline">Forgot password?</a>
          </div>
          <input type="submit" value="Sign In"
            class="w-full p-2 bg-teal-600 text-white rounded hover:bg-teal-700 cursor-pointer font-semibold">
        </form>

        <p class="text-sm text-center mt-4 text-gray-600">
          Don't have an account?
          <a href="../signup/signup.html" class="text-teal-600 hover:underline font-medium">Sign Up</a>
        </p>
      </div>

      <!-- SUCCESS SECTION -->
      <div id="successSection" class="hidden text-center py-6">
        <div class="flex items-center justify-center w-16 h-16 bg-teal-100 rounded-full mx-auto mb-4">
          <svg class="w-8 h-8 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-teal-800 mb-1">Signed In Successfully!</h2>
        <p class="text-gray-500 text-sm mb-1">Welcome back to Velora.</p>
        <p id="successEmail" class="text-teal-700 font-semibold text-sm mb-6"></p>
        <a href="/index.html"
          class="inline-block px-6 py-2 bg-teal-600 text-white rounded hover:bg-teal-700 font-semibold text-sm">
          Go to Homepage
        </a>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="bg-teal-900 text-white text-center p-4">
    © 2026 Velora. All rights reserved.
  </footer>

  <script src="../../src/scripts/script.js"></script>

</body>
</html>
